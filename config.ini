# Traffic Detection Configuration File
# Edit these values to fine-tune detection accuracy

[TRAFFIC_LIGHTS]
# HSV ranges for traffic light detection
# RED light
RED_LOWER1_H = 0
RED_LOWER1_S = 120
RED_LOWER1_V = 70
RED_UPPER1_H = 10
RED_UPPER1_S = 255
RED_UPPER1_V = 255

RED_LOWER2_H = 170
RED_LOWER2_S = 120
RED_LOWER2_V = 70
RED_UPPER2_H = 180
RED_UPPER2_S = 255
RED_UPPER2_V = 255

# YELLOW light
YELLOW_LOWER_H = 15
YELLOW_LOWER_S = 150
YELLOW_LOWER_V = 150
YELLOW_UPPER_H = 35
YELLOW_UPPER_S = 255
YELLOW_UPPER_V = 255

# GREEN light
GREEN_LOWER_H = 36
GREEN_LOWER_S = 100
GREEN_LOWER_V = 100
GREEN_UPPER_H = 85
GREEN_UPPER_S = 255
GREEN_UPPER_V = 255

# Minimum pixels required to detect a signal (lower = more sensitive)
MIN_PIXELS = 100

[TRAFFIC_SIGNS]
# YOLOv8 Model settings
MODEL = yolov8s.pt  # Options: yolov8n.pt (fast), yolov8s.pt (balanced), yolov8m.pt (accurate)
CONFIDENCE_THRESHOLD = 0.35  # Lower = more detections but more false positives (0.0-1.0)
IOU_THRESHOLD = 0.45  # Non-Maximum Suppression threshold (0.0-1.0)
ENABLE_PREPROCESSING = true  # Enable contrast enhancement for varying lighting
